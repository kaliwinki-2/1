<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Purolator — Multi-Package Tracking</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@300;400;600;700&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --red:#DA291C; --blue:#003DA5; --text:#222; --muted:#555;
    --border:#d0d0d0; --bg:#f5f5f5; --white:#fff;
    --font:'Source Sans 3','Helvetica Neue',Helvetica,Arial,sans-serif;
  }
  body { font-family:var(--font); background:var(--bg); color:var(--text); font-size:15px; -webkit-font-smoothing:antialiased; }

  /* ══ PUROLATOR HEADER — pixel-faithful ══ */

  /* Sticky wrapper */
  .site-header {
    position:sticky; top:0; z-index:200;
    background:#fff;
    box-shadow:0 2px 8px rgba(0,0,0,.10);
  }

  /* ── Top utility bar ── */
  .header-top {
    border-bottom:1px solid #e8e8e8;
    background:#fff;
  }
  .header-top-inner {
    max-width:1200px; margin:0 auto;
    padding:0 24px;
    height:44px;
    display:flex; align-items:center; justify-content:space-between;
  }

  /* Logo */
  .puro-logo-wrap { display:flex; align-items:center; }
  .puro-logo-wrap img {
    height:22px; width:auto; display:block;
  }
  /* Fallback SVG logo if no image file */
  .puro-logo-wrap svg { height:22px; }

  /* Utility links (right side of top bar) */
  .header-utils {
    display:flex; align-items:center; gap:4px;
  }
  .util-link {
    display:flex; align-items:center; gap:5px;
    font-family:var(--font); font-size:13px; font-weight:400;
    color:#333; text-decoration:none; padding:6px 10px;
    border-radius:3px; white-space:nowrap;
    transition:background .12s;
    cursor:pointer; border:none; background:none;
  }
  .util-link:hover { background:#f0f5ff; color:var(--blue); }
  .util-link svg { width:16px; height:16px; flex-shrink:0; color:#00a0b4; }
  .util-link.login-btn {
    background:var(--blue); color:#fff; font-weight:600;
    border-radius:4px; padding:6px 16px;
  }
  .util-link.login-btn:hover { background:#002d80; }
  .util-link.fr-link {
    font-weight:600; color:#333; padding:6px 8px;
  }
  .util-divider {
    width:1px; height:18px; background:#ddd; margin:0 2px; flex-shrink:0;
  }

  /* ── Main navigation bar ── */
  .header-nav {
    background:#fff;
    border-bottom:1px solid #e8e8e8;
  }
  .header-nav-inner {
    max-width:1200px; margin:0 auto;
    padding:0 24px;
    height:46px;
    display:flex; align-items:center; justify-content:center;
    gap:0;
    position:relative;
  }
  .nav-item {
    display:flex; align-items:center; gap:5px;
    font-family:var(--font); font-size:14.5px; font-weight:400;
    color:#333; text-decoration:none; padding:0 20px;
    height:46px; cursor:pointer; white-space:nowrap;
    border-bottom:3px solid transparent;
    transition:border-color .15s, color .15s;
    border:none; background:none;
  }
  .nav-item:hover { color:var(--blue); border-bottom:3px solid var(--blue); }
  .nav-item svg { width:12px; height:12px; color:#777; flex-shrink:0; }

  /* Search icon — right side */
  .nav-search {
    position:absolute; right:24px;
    display:flex; align-items:center; justify-content:center;
    width:38px; height:38px; border-radius:3px;
    cursor:pointer; border:none; background:none;
    transition:background .12s;
  }
  .nav-search:hover { background:#f0f0f0; }
  .nav-search svg { width:18px; height:18px; color:#555; }

  /* ── Breadcrumb ── */
  .breadcrumb {
    background:#fff; border-bottom:1px solid #ebebeb;
    padding:8px 24px;
    max-width:1200px; margin:0 auto;
    display:flex; align-items:center; gap:6px;
    font-size:13px; color:#666;
  }
  .breadcrumb a { color:#555; text-decoration:none; }
  .breadcrumb a:hover { color:var(--blue); text-decoration:underline; }
  .breadcrumb svg { width:13px; height:13px; color:#888; flex-shrink:0; }
  .breadcrumb .sep { color:#bbb; }
  .bc-wrap { background:#fff; border-bottom:1px solid #ebebeb; }

  /* PAGE */
  .page { max-width:620px; margin:0 auto; padding:20px 16px 60px; }

  /* TOOLBAR */
  .toolbar {
    display:flex; align-items:center; gap:10px; margin-bottom:14px; flex-wrap:wrap;
  }
  .btn {
    font-family:var(--font); font-size:13px; font-weight:600;
    padding:8px 16px; border-radius:3px; border:none; cursor:pointer;
    transition:background .13s, transform .1s;
  }
  .btn:active { transform:scale(.97); }
  .btn-blue { background:var(--blue); color:#fff; }
  .btn-blue:hover { background:#002d80; }
  .btn-outline { background:#fff; color:#333; border:1px solid var(--border); }
  .btn-outline:hover { background:#f0f0f0; }
  .btn-green { background:#1a7a3a; color:#fff; }
  .btn-green:hover { background:#145e2c; }
  .btn-chat { background:#f0f4fb; color:var(--blue); border:1px solid #c5d3ec; }
  .btn-chat:hover { background:#e0eaf8; }

  /* COUNT BADGE */
  .pkg-count {
    margin-left:auto; font-size:12px; color:var(--muted);
    background:#eee; padding:4px 10px; border-radius:20px;
  }

  /* FILTER BAR — rectangular tabs (see below) */
  .filter-bar {
    border-bottom:2px solid var(--border);
    margin-bottom:14px;
    display:flex; gap:0; flex-wrap:wrap;
  }
  .filter-btn {
    font-family:var(--font); font-size:13px; font-weight:600;
    padding:9px 18px; border-radius:0; border:none; border-bottom:3px solid transparent;
    background:none; cursor:pointer; color:var(--muted);
    transition:color .12s, border-color .12s;
    margin-bottom:-2px;
    white-space:nowrap;
  }
  .filter-btn.active { color:var(--blue); border-bottom-color:var(--blue); }
  .filter-btn:hover:not(.active) { color:var(--blue); background:#f5f7fc; }


  /* PACKAGE CARD */
  .pkg-card {
    background:var(--white); border:1px solid var(--border); border-radius:3px;
    margin-bottom:12px; overflow:hidden;
    animation: fadeIn .25s ease;
  }
  @keyframes fadeIn { from{opacity:0;transform:translateY(-6px)} to{opacity:1;transform:translateY(0)} }

  .pkg-header {
    padding:13px 16px; display:flex; align-items:center; justify-content:space-between;
    cursor:pointer; user-select:none; gap:10px; transition:background .12s;
  }
  .pkg-header:hover { background:#fafafa; }

  .pkg-left { display:flex; flex-direction:column; gap:2px; flex:1; min-width:0; }
  .pkg-tracking {
    font-size:13.5px; font-weight:700; color:var(--blue);
    font-family:'Source Sans 3','Helvetica Neue',Helvetica,Arial,sans-serif;
    letter-spacing:.3px;
  }
  .pkg-meta { display:flex; gap:10px; align-items:center; flex-wrap:wrap; }
  .pkg-label { font-size:13px; color:var(--muted); }
  .pkg-dest { font-size:12px; color:#888; }

  .pkg-right { display:flex; align-items:center; gap:8px; flex-shrink:0; }

  /* STATUS PILLS */
  .status-pill {
    font-size:11px; font-weight:700; padding:3px 9px; border-radius:2px;
    cursor:pointer; white-space:nowrap; transition:opacity .12s; letter-spacing:.2px;
  }
  .status-pill:hover { opacity:.8; }
  .sp-delivered { background:#e8f5ec; color:#1a7a3a; }
  .sp-transit   { background:#e6edf8; color:var(--blue); }
  .sp-delayed   { background:#fde8e7; color:var(--red); }
  .sp-pending   { background:#fff4e0; color:#b45309; }
  .sp-outfordelivery { background:#f0e8f8; color:#6b21a8; }

  /* CHEVRON */
  .chevron { width:17px; height:17px; color:#999; transition:transform .2s; flex-shrink:0; }
  .pkg-card.open .chevron { transform:rotate(180deg); }

  /* DELETE PKG */
  .pkg-del {
    background:none; border:none; cursor:pointer; color:#ccc; font-size:13px;
    padding:3px 5px; border-radius:3px; transition:color .12s,background .12s; flex-shrink:0;
  }
  .pkg-del:hover { color:var(--red); background:#fde8e7; }

  /* BODY */
  .pkg-body { display:none; border-top:1px solid var(--border); }
  .pkg-card.open .pkg-body { display:block; }

  /* PROGRESS BAR */
  .progress-wrap { padding:10px 16px 6px; background:#fafafa; border-bottom:1px solid #eee; }
  .progress-label {
    display:flex; justify-content:space-between; font-size:11px;
    color:var(--muted); margin-bottom:5px; font-weight:600; letter-spacing:.3px;
  }
  .progress-bar { height:4px; background:#e0e0e0; border-radius:2px; overflow:hidden; }
  .progress-fill { height:100%; background:var(--blue); border-radius:2px; transition:width .4s; }
  .progress-fill.delayed { background:var(--red); }
  .progress-fill.done    { background:#1a7a3a; }

  /* TABLE */
  .track-table { width:100%; border-collapse:collapse; }
  .track-table thead tr { background:#f7f7f7; border-bottom:1px solid var(--border); }
  .track-table thead th { padding:8px 12px; text-align:left; font-size:11.5px; font-weight:700; color:#444; text-transform:uppercase; letter-spacing:.5px; }
  .track-table tbody tr { border-bottom:1px solid #ebebeb; transition:background .1s; }
  .track-table tbody tr:last-child { border-bottom:none; }
  .track-table tbody tr:hover { background:#fafafa; }
  .track-table tbody tr.alert-row td { color:var(--red); }
  .track-table tbody td { padding:9px 12px; font-size:14px; line-height:1.4; vertical-align:top; }
  .td-date { width:36%; white-space:nowrap; }
  .td-city { width:26%; }
  .td-desc { width:38%; }

  /* EDITABLE */
  [contenteditable="true"] {
    outline:none; border-radius:2px; cursor:text; display:inline;
    padding:1px 3px; margin:-1px -3px; transition:background .12s;
  }
  [contenteditable="true"]:hover  { background:rgba(0,61,165,.07); }
  [contenteditable="true"]:focus  { background:rgba(0,61,165,.1); box-shadow:0 0 0 1px rgba(0,61,165,.3); }

  /* ROW DELETE */
  .row-actions { width:26px; text-align:right; padding-right:8px !important; }
  .del-row {
    background:none; border:none; cursor:pointer; color:#ccc; font-size:12px;
    padding:2px 4px; border-radius:3px; transition:color .12s,background .12s; visibility:hidden;
  }
  tr:hover .del-row { visibility:visible; }
  .del-row:hover { color:var(--red); background:#fde8e7; }

  /* ADD ROW */
  .add-row-bar {
    padding:9px 14px; display:flex; gap:10px;
    border-top:2px dashed #d8dde8; background:#f7f9fc;
    align-items:center;
  }
  .btn-add-row {
    font-family:var(--font); font-size:12.5px; font-weight:600;
    padding:6px 14px; border-radius:3px; border:1.5px solid var(--blue);
    background:#fff; cursor:pointer; color:var(--blue);
    display:inline-flex; align-items:center; gap:5px;
    transition:background .12s, box-shadow .12s;
    box-shadow:0 1px 3px rgba(0,61,165,.08);
  }
  .btn-add-row:hover { background:#e6edf8; box-shadow:0 2px 6px rgba(0,61,165,.15); }
  .btn-add-alert {
    color:#0077a8; border-color:#0077a8;
    box-shadow:0 1px 3px rgba(0,119,168,.08);
  }
  .btn-add-alert:hover { background:#e6f4f9; box-shadow:0 2px 6px rgba(0,119,168,.15); }

  /* GENERATE MODAL */
  .modal-overlay {
    display:none; position:fixed; inset:0; background:rgba(0,0,0,.45); z-index:200;
    align-items:center; justify-content:center;
  }
  .modal-overlay.visible { display:flex; }
  .modal {
    background:#fff; border-radius:6px; padding:28px 28px 24px; width:440px; max-width:95vw;
    box-shadow:0 8px 40px rgba(0,0,0,.2); animation:fadeIn .2s ease;
  }
  .modal h3 { font-size:16px; font-weight:700; color:var(--blue); margin-bottom:6px; }
  .modal p  { font-size:13px; color:var(--muted); margin-bottom:18px; }
  .modal-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:18px; }
  .modal-field label { display:block; font-size:11.5px; font-weight:700; color:#444; text-transform:uppercase; letter-spacing:.4px; margin-bottom:5px; }
  .modal-field select, .modal-field input {
    width:100%; font-family:var(--font); font-size:13px; padding:7px 10px;
    border:1px solid var(--border); border-radius:3px; outline:none; color:var(--text);
    transition:border .12s, box-shadow .12s;
  }
  .modal-field select:focus, .modal-field input:focus {
    border-color:var(--blue); box-shadow:0 0 0 2px rgba(0,61,165,.12);
  }
  .modal-field.full { grid-column:1/-1; }
  .modal-actions { display:flex; gap:10px; justify-content:flex-end; }
  .btn-cancel { background:#f0f0f0; color:#444; border:none; }
  .btn-cancel:hover { background:#e0e0e0; }


  /* DATE BAR */
  .date-bar {
    display:flex; align-items:center; gap:10px; margin-bottom:14px;
    padding:10px 14px; background:#fff; border:1px solid var(--border);
    border-radius:3px; flex-wrap:wrap;
  }
  .date-bar-label { font-size:13px; font-weight:600; color:#444; white-space:nowrap; }
  .date-input {
    font-family:var(--font); font-size:13px; padding:5px 10px;
    border:1px solid var(--border); border-radius:3px; outline:none; color:var(--text);
    transition:border .12s, box-shadow .12s;
  }
  .date-input:focus { border-color:var(--blue); box-shadow:0 0 0 2px rgba(0,61,165,.12); }
  .btn-small { padding:5px 12px; font-size:12px; }
  .date-hint { font-size:11.5px; color:#999; }

  /* PAGINATION */
  .pagination {
    display:flex; align-items:center; justify-content:center;
    gap:4px; padding:28px 0 40px; flex-wrap:wrap;
  }
  .page-btn {
    font-family:var(--font); font-size:13px; font-weight:500;
    width:36px; height:36px; border-radius:3px; border:1px solid var(--border);
    background:#fff; color:#333; cursor:pointer;
    display:flex; align-items:center; justify-content:center;
    transition:background .12s, color .12s, border-color .12s;
    text-decoration:none;
  }
  .page-btn:hover { background:var(--blue); color:#fff; border-color:var(--blue); }
  .page-btn.active { background:var(--blue); color:#fff; border-color:var(--blue); pointer-events:none; }
  .page-btn.page-prev, .page-btn.page-next { width:auto; padding:0 12px; }
  .page-dots { font-size:13px; color:#aaa; padding:0 4px; line-height:36px; }

  @media print {
    .toolbar,.filter-bar,.hint,.add-row-bar,.del-row,.pkg-del,.modal-overlay,.progress-wrap,
    .header-utils,.header-nav,.bc-wrap { display:none !important; }
    .pkg-body { display:block !important; }
    body { background:#fff; }
  }
</style>

// ROUTE BUILDER
// ══════════════════════════════════════════════════════════════════
function rand(arr) { return arr[Math.floor(Math.random()*arr.length)]; }
function pad2(n)   { return String(n).padStart(2,'0'); }

function formatDate(d) {
  const days   = ['Sun.','Mon.','Tue.','Wed.','Thu.','Fri.','Sat.'];
  const months = ['Jan.','Feb.','Mar.','Apr.','May','Jun.','Jul.','Aug.','Sep.','Oct.','Nov.','Dec.'];
  let h = d.getHours(), m = d.getMinutes(), ampm = h>=12 ? 'p.m.' : 'a.m.';
  h = h%12 || 12;
  return `${days[d.getDay()]} ${months[d.getMonth()]} ${d.getDate()}, ${d.getFullYear()} - ${h}:${pad2(m)} ${ampm}`;
}

// ── Helper: build a Date anchored to a specific day+hour after pickup ──
function routeTime(pickup, dayOffset, hour, minVariance) {
  const d = new Date(pickup);
  d.setDate(d.getDate() + dayOffset);
  d.setHours(hour, Math.floor(Math.random() * (minVariance || 20)), 0, 0);
  return d;
}

// ── Snap to delivery morning (5:00–6:00 AM) on a given day ──
function snapOnTruck(pickup, dayOffset) {
  const d = new Date(pickup);
  d.setDate(d.getDate() + dayOffset);
  d.setHours(5, Math.floor(Math.random()*30), 0, 0); // 5:00–5:30 AM
  return d;
}

// ── Snap to delivery window (9:30 AM–1:00 PM) on a given day ──
function snapDelivered(pickup, dayOffset) {
  const d = new Date(pickup);
  d.setDate(d.getDate() + dayOffset);
  const baseMin = 9*60 + 30; // 9:30 AM in minutes
  const addMin  = Math.floor(Math.random()*210); // up to 3.5h later = 1:00 PM
  d.setHours(Math.floor((baseMin+addMin)/60), (baseMin+addMin)%60, 0, 0);
  return d;
}

// Cities that are served directly from Ottawa without a major hub transit
const QC_NEAR_CITIES  = new Set(['Gatineau, QC']);
const QC_EAST_CITIES  = new Set(['Québec City, QC','Lévis, QC','Saguenay, QC','Rimouski, QC',
                                  'Shawinigan, QC','Victoriaville, QC']);
const ON_EAST_CITIES  = new Set(['Kingston, ON','Peterborough, ON']);

function buildRoute(province, scenario, deliveryDaysAgo=0) {
  const cities   = CITIES[province];
  const isQC     = province === 'QC';
  const namePool = isQC ? NAMES.QC : NAMES.EN;
  const dest     = rand(cities);
  const name     = rand(namePool);

  // ── Pick the correct route based on destination ───────────────
  let routeKey = province;
  if (province === 'QC') {
    if (QC_NEAR_CITIES.has(dest.name))  routeKey = 'QC_NEAR';
    else if (QC_EAST_CITIES.has(dest.name)) routeKey = 'QC_EAST';
  } else if (province === 'ON') {
    if (ON_EAST_CITIES.has(dest.name)) routeKey = 'ON_EAST';
  }
  const route    = ROUTES[routeKey];
  const delivDay = route.transitDays; // 1 for near, 2 for QC/ON, 3 for others

  // ── Core date logic ───────────────────────────────────────────
  // deliveryDaysAgo = 0 → delivery happens on MASTER_DATE (today)
  // deliveryDaysAgo = N → delivery happened N days before MASTER_DATE
  //
  // Delivery date = MASTER_DATE - deliveryDaysAgo
  // Pickup date   = DeliveryDate - delivDay
  //
  // This guarantees:
  //   • outfordelivery (deliveryDaysAgo=0) → truck is out TODAY
  //   • transit (deliveryDaysAgo=0)       → pickup was delivDay days ago, delivery upcoming today
  //   • clean (deliveryDaysAgo=1)         → delivered yesterday
  //
  const deliveryDate = new Date(MASTER_DATE);
  deliveryDate.setDate(deliveryDate.getDate() - deliveryDaysAgo);

  const pickup = new Date(deliveryDate);
  pickup.setDate(pickup.getDate() - delivDay);
  pickup.setHours(14, 0, 0, 0); // placeholder — overridden by label block below

  // Label/pickup window: 2:00 PM – 4:00 PM on pickup day
  // labelCreated → labelInfo (+8-15 min) → pickedUp (+20-40 min)
  const labelHour = 14 + Math.floor(Math.random() * 2); // 14 or 15
  const labelMin  = Math.floor(Math.random() * 45);      // :00 to :44
  const labelTime = new Date(pickup);
  labelTime.setHours(labelHour, labelMin, 0, 0);
  const labelInfoTime = new Date(labelTime.getTime() + (8 + Math.floor(Math.random()*8))*60000);
  pickup.setHours(labelHour, labelMin + 25 + Math.floor(Math.random()*20), 0, 0);
  // Clamp pickup to max 4:00 PM
  if (pickup.getHours() >= 16) pickup.setHours(15, 50 + Math.floor(Math.random()*9), 0, 0);

  const events = [];

  // ── Step 1: Label events ──────────────────────────────────────
  events.push({ time:labelTime,     city:'PUROLATOR',   desc:'Shipper created label', alert:false });
  events.push({ time:labelInfoTime, city:'PUROLATOR',   desc:'Label information electronically submitted', alert:false });
  events.push({ time:pickup,        city:'Ottawa, ON',  desc:'Picked up by Purolator', alert:false });

  // ── Step 2: Hub steps (resolve __DEST__ → actual dest name) ──
  const totalSteps = route.steps.length;
  const stepFrac   = SCENARIO_STEPS[scenario];
  const stepsToInclude = (stepFrac === undefined)
    ? totalSteps
    : Math.max(0, Math.floor(totalSteps * stepFrac));

  for (let i = 0; i < stepsToInclude; i++) {
    const s    = route.steps[i];
    const city = s.hub === '__DEST__' ? dest.name : s.hub;
    const t    = routeTime(pickup, s.day, s.hour, 20);
    events.push({ time:t, city, desc:s.desc, alert:false });
  }

  // helper — get last hub city from steps included so far
  const lastHubCity = () => {
    for(let i=stepsToInclude-1; i>=0; i--){
      const h = route.steps[i].hub;
      if(h !== '__DEST__') return h;
    }
    return 'Ottawa, ON';
  };

  // helper — alert time: just after last included step
  const alertTime = (plusHours=1) => {
    if(stepsToInclude === 0) return new Date(pickup.getTime() + plusHours*3600000);
    const ls = route.steps[stepsToInclude-1];
    return new Date(routeTime(pickup, ls.day, ls.hour, 5).getTime() + plusHours*3600000);
  };

  // ── Step 3: Terminal events by scenario ──────────────────────

  // ── CLEAN DELIVERIES ─────────────────────────────────────────
  const DELIVERED_DESCS = {
    clean:           'Delivered',
    clean_signature: 'Delivered — Signature obtained',
    clean_door:      'Delivered — Left at front door',
    clean_reception: 'Delivered — Left at reception / front desk',
    clean_locker:    'Delivered — Deposited in parcel locker',
  };
  if (DELIVERED_DESCS[scenario]) {
    const onTruck   = snapOnTruck(pickup, delivDay);
    const delivered = snapDelivered(pickup, delivDay);
    let delivDesc = DELIVERED_DESCS[scenario].replace('{N}', Math.floor(Math.random()*20)+1);
    events.push({ time:onTruck,   city:dest.name, desc:'On vehicle for delivery', alert:false });
    events.push({ time:delivered, city:dest.name, desc:delivDesc,                 alert:false });
  }

  // ── OUT FOR DELIVERY ─────────────────────────────────────────
  else if (scenario === 'outfordelivery') {
    events.push({ time:snapOnTruck(pickup, delivDay), city:dest.name, desc:'On vehicle for delivery', alert:false });
  }
  else if (scenario === 'outfordelivery_pm') {
    const t = new Date(pickup); t.setDate(t.getDate()+delivDay); t.setHours(12,10+Math.floor(Math.random()*30),0,0);
    events.push({ time:t, city:dest.name, desc:'On vehicle for delivery', alert:false });
  }
  else if (scenario === 'ofd_second_attempt') {
    const first = snapOnTruck(pickup, delivDay);
    const noone = new Date(first.getTime() + (3+Math.floor(Math.random()*3))*3600000);
    // Second attempt same day (later in the morning/afternoon, not tomorrow)
    const second = new Date(noone.getTime() + (2+Math.floor(Math.random()*2))*3600000);
    events.push({ time:first,  city:dest.name, desc:'On vehicle for delivery', alert:false });
    events.push({ time:noone,  city:dest.name, desc:'Delivery attempted — no one available to accept shipment', alert:true });
    events.push({ time:second, city:dest.name, desc:'On vehicle for delivery — second attempt', alert:false });
  }

  // ── RESCHEDULED / ATTEMPTED ───────────────────────────────────
  else if (scenario === 'rescheduled') {
    const onTruck = snapOnTruck(pickup, delivDay);
    const fail    = new Date(onTruck.getTime() + (5+Math.floor(Math.random()*4))*3600000);
    events.push({ time:onTruck, city:dest.name, desc:'On vehicle for delivery', alert:false });
    events.push({ time:fail,    city:dest.name, desc:'Delivery rescheduled for the next business day', alert:true });
  }
  else if (scenario === 'rescheduled_cust') {
    const onTruck = snapOnTruck(pickup, delivDay);
    const fail    = new Date(onTruck.getTime() + 2*3600000);
    events.push({ time:onTruck, city:dest.name, desc:'On vehicle for delivery', alert:false });
    events.push({ time:fail,    city:dest.name, desc:'Delivery rescheduled — rescheduled at customer request', alert:true });
  }
  else if (scenario === 'attempted_nosig') {
    const onTruck = snapOnTruck(pickup, delivDay);
    const attempt = new Date(onTruck.getTime() + (3+Math.floor(Math.random()*4))*3600000);
    events.push({ time:onTruck,  city:dest.name, desc:'On vehicle for delivery', alert:false });
    events.push({ time:attempt,  city:dest.name, desc:'Delivery attempted — signature required, no one home to sign', alert:true });
  }
  else if (scenario === 'attempted_access') {
    const onTruck = snapOnTruck(pickup, delivDay);
    const attempt = new Date(onTruck.getTime() + (2+Math.floor(Math.random()*3))*3600000);
    events.push({ time:onTruck,  city:dest.name, desc:'On vehicle for delivery', alert:false });
    events.push({ time:attempt,  city:dest.name, desc:'Delivery attempted — access to location denied or restricted', alert:true });
  }
  else if (scenario === 'attempted_refused') {
    const onTruck = snapOnTruck(pickup, delivDay);
    const attempt = new Date(onTruck.getTime() + (2+Math.floor(Math.random()*4))*3600000);
    events.push({ time:onTruck,  city:dest.name, desc:'On vehicle for delivery', alert:false });
    events.push({ time:attempt,  city:dest.name, desc:'Delivery refused by recipient — shipment being returned to sender', alert:true });
  }

  // ── HELD / EXCEPTION ─────────────────────────────────────────
  else if (scenario === 'held_facility') {
    const t = alertTime(2);
    events.push({ time:t, city:dest.name, desc:'Shipment held at facility — customer contact required', alert:true });
  }
  else if (scenario === 'held_pickup') {
    const arrive  = routeTime(pickup, delivDay, 8, 20);
    const heldAt  = new Date(arrive.getTime() + 3600000);
    events.push({ time:arrive, city:dest.name, desc:'Arrived at sort facility', alert:false });
    events.push({ time:heldAt, city:dest.name, desc:'Shipment held at depot — available for customer pickup', alert:true });
  }
  else if (scenario === 'address_issue') {
    const t = alertTime(1.5);
    events.push({ time:t, city:lastHubCity(), desc:'Shipment on hold — address information cannot be verified', alert:true });
  }
  else if (scenario === 'exception_investigation') {
    const t = alertTime(2);
    events.push({ time:t, city:lastHubCity(), desc:'Shipment exception — investigation initiated. Please contact Purolator for assistance.', alert:true });
  }
  else if (scenario === 'return_transit') {
    const returnStart = alertTime(1);
    const returnMid   = new Date(returnStart.getTime() + 8*3600000);
    events.push({ time:returnStart, city:dest.name,    desc:'Return initiated — shipment being returned to sender', alert:true });
    events.push({ time:returnMid,   city:'Ottawa, ON', desc:'Return shipment in transit — arrived at Ottawa facility', alert:false });
  }

  // ── DELAYED ──────────────────────────────────────────────────
  else if (scenario === 'delayed_sort') {
    events.push({ time:alertTime(1), city:lastHubCity(), desc:'Delayed by 1 business day due to sorting error', alert:true });
  }
  else if (scenario === 'missed_conn') {
    events.push({ time:alertTime(2), city:lastHubCity(), desc:'Delayed in transit due to missed connection', alert:true });
  }
  else if (scenario === 'disruption_weather') {
    events.push({ time:alertTime(1), city:lastHubCity(), desc:'Delayed in transit due to severe weather conditions', alert:true });
  }
  else if (scenario === 'disruption_road') {
    events.push({ time:alertTime(1), city:lastHubCity(), desc:'Delayed in transit — road closure on service route', alert:true });
  }
  else if (scenario === 'disruption_mech') {
    events.push({ time:alertTime(2), city:lastHubCity(), desc:'Delayed in transit — vehicle mechanical issue on service route', alert:true });
  }
  else if (scenario === 'delayed_volume') {
    events.push({ time:alertTime(2), city:lastHubCity(), desc:'Delayed due to higher than expected package volume', alert:true });
  }
  else if (scenario === 'delayed_address') {
    events.push({ time:alertTime(1), city:'Ottawa, ON', desc:'Delayed — address verification required before shipment can proceed', alert:true });
  }
  else if (scenario === 'delayed_weight') {
    events.push({ time:alertTime(1), city:'Ottawa, ON', desc:'Delayed — weight discrepancy between label and actual shipment weight', alert:true });
  }
  else if (scenario === 'delayed_damaged') {
    events.push({ time:alertTime(2), city:lastHubCity(), desc:'Delayed — package damage inspection in progress', alert:true });
  }
  else if (scenario === 'delayed_holiday') {
    events.push({ time:alertTime(4), city:lastHubCity(), desc:'Delayed — statutory holiday affecting service on this route', alert:true });
  }
  // transit_early, transit, transit_near, pending, pending_label → no terminal event

  // ── Step 4: Sort newest→oldest, build rows ────────────────────
  events.sort((a,b) => b.time - a.time);
  const rows = events.map(e => ({
    date: formatDate(e.time),
    city: e.city,
    desc: e.desc,
    alert: e.alert,
    minuteOffset: Math.round((e.time - MASTER_DATE) / 60000),
  }));

  pkgSeq++;
  const tracking = '329' + String(180042000 + pkgSeq);
  const label    = `Order #${pkgSeq} — ${name}`;
  const status = SCENARIO_STATUS[scenario] || 'transit';

  return { tracking, label, status, dest:dest.name, province, rows };
}

// ══════════════════════════════════════════════════════════════════
// UI BUILDER
// ══════════════════════════════════════════════════════════════════
function makeTrackRow(r) {
  const tr = document.createElement('tr');
  if (r.alert) tr.classList.add('alert-row');
  if (r.minuteOffset !== undefined) tr.dataset.minuteOffset = r.minuteOffset;
  tr.innerHTML = `
    <td class="td-date"><span contenteditable="true">${r.date}</span></td>
    <td class="td-city"><span contenteditable="true">${r.city}</span></td>
    <td class="td-desc"><span contenteditable="true">${r.desc}</span></td>
    <td class="row-actions"><button class="del-row">✕</button></td>
  `;
  tr.querySelector('.td-date').addEventListener('dblclick', () => tr.classList.toggle('alert-row'));
  tr.querySelector('.del-row').addEventListener('click', e => { e.stopPropagation(); tr.remove(); });
  return tr;
}

function makePkgCard(pkg, open=false) {
  const card = document.createElement('div');
  card.className = 'pkg-card' + (open ? ' open' : '');
  card.dataset.status = pkg.status;

  // ── Header ──
  const header = document.createElement('div');
  header.className = 'pkg-header';

  const left = document.createElement('div');
  left.className = 'pkg-left';

  const trackEl = document.createElement('span');
  trackEl.className = 'pkg-tracking';
  trackEl.contentEditable = 'true';
  trackEl.textContent = pkg.tracking;
  trackEl.addEventListener('click', e => e.stopPropagation());

  const meta = document.createElement('div');
  meta.className = 'pkg-meta';

  const labelEl = document.createElement('span');
  labelEl.className = 'pkg-label';
  labelEl.contentEditable = 'true';
  labelEl.textContent = pkg.label;
  labelEl.addEventListener('click', e => e.stopPropagation());

  const destEl = document.createElement('span');
  destEl.className = 'pkg-dest';
  destEl.textContent = '→ ' + (pkg.dest || '');

  meta.appendChild(labelEl);
  meta.appendChild(destEl);
  left.appendChild(trackEl);
  left.appendChild(meta);

  // Status pill
  const pill = document.createElement('span');
  pill.className = 'status-pill ' + STATUS_CLS[pkg.status];
  pill.textContent = STATUS_LABELS[pkg.status];
  pill.dataset.status = pkg.status;
  pill.title = 'Click to cycle status';
  pill.addEventListener('click', e => {
    e.stopPropagation();
    const idx  = STATUS_CYCLE.indexOf(pill.dataset.status);
    const next = STATUS_CYCLE[(idx+1)%STATUS_CYCLE.length];
    pill.dataset.status = next;
    card.dataset.status = next;
    pill.className = 'status-pill ' + STATUS_CLS[next];
    pill.textContent = STATUS_LABELS[next];
    // update progress
    const fill = card.querySelector('.progress-fill');
    if (fill) {
      fill.style.width = STATUS_PROG[next] + '%';
      fill.className = 'progress-fill ' + (PROG_CLASS[next]||'');
    }
    applyFilter(currentFilter);
  });

  const chev = document.createElementNS('http://www.w3.org/2000/svg','svg');
  chev.setAttribute('viewBox','0 0 24 24'); chev.setAttribute('fill','none');
  chev.setAttribute('stroke','currentColor'); chev.setAttribute('stroke-width','2.2');
  chev.setAttribute('class','chevron');
  chev.innerHTML = '<polyline points="6 9 12 15 18 9"/>';

  const delBtn = document.createElement('button');
  delBtn.className = 'pkg-del';
  delBtn.textContent = '✕';
  delBtn.title = 'Remove package';
  delBtn.addEventListener('click', e => { e.stopPropagation(); card.remove(); updateCount(); applyFilter(currentFilter); });

  const right = document.createElement('div');
  right.className = 'pkg-right';
  right.appendChild(pill); right.appendChild(chev); right.appendChild(delBtn);

  header.appendChild(left); header.appendChild(right);
  header.addEventListener('click', () => card.classList.toggle('open'));

  // ── Body ──
  const body = document.createElement('div');
  body.className = 'pkg-body';

  // Progress bar
  const progPct = STATUS_PROG[pkg.status] || 20;
  const progCls = PROG_CLASS[pkg.status] || '';
  const pWrap = document.createElement('div');
  pWrap.className = 'progress-wrap';
  pWrap.innerHTML = `
    <div class="progress-label">
      <span>Ottawa, ON</span>
      <span>${pkg.dest || '—'}</span>
    </div>
    <div class="progress-bar"><div class="progress-fill ${progCls}" style="width:${progPct}%"></div></div>
  `;
  body.appendChild(pWrap);

  // Table
  const table = document.createElement('table');
  table.className = 'track-table';
  table.innerHTML = `<thead><tr><th>Date</th><th>City</th><th>Description</th><th></th></tr></thead>`;
  const tbody = document.createElement('tbody');
  (pkg.rows||[]).forEach(r => tbody.appendChild(makeTrackRow(r)));
  table.appendChild(tbody);
  body.appendChild(table);
  // Store minute offsets for date re-rendering
  requestAnimationFrame(() => {
    const offsets = [...card.querySelectorAll('.td-date [contenteditable]')].map((_, i) => {
      const row = card.querySelectorAll('tbody tr')[i];
      return row ? Number(row.dataset.minuteOffset || 0) : 0;
    });
    CARD_OFFSETS.set(card, offsets);
  });

  // Add-row bar
  const addBar = document.createElement('div');
  addBar.className = 'add-row-bar';
  const btnNorm = document.createElement('button');
  btnNorm.className = 'btn-add-row'; btnNorm.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" style="width:13px;height:13px"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 01-2-2v-5a2 2 0 012-2h16a2 2 0 012 2v5a2 2 0 01-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg> Print';
  btnNorm.title = 'Print this shipment';
  btnNorm.addEventListener('click', e => { e.stopPropagation(); window.print(); });
  const btnAlert = document.createElement('button');
  btnAlert.className = 'btn-add-row btn-add-alert'; btnAlert.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" style="width:13px;height:13px"><path stroke-linecap="round" stroke-linejoin="round" d="M22 2L11 13"/><path stroke-linecap="round" stroke-linejoin="round" d="M22 2L15 22 11 13 2 9l20-7z"/></svg> Send tracking info';
  btnAlert.title = 'Send tracking info to recipient';
  btnAlert.addEventListener('click', e => { e.stopPropagation(); });
  addBar.appendChild(btnNorm); addBar.appendChild(btnAlert);
  body.appendChild(addBar);

  card.appendChild(header); card.appendChild(body);
  return card;
}

// ══════════════════════════════════════════════════════════════════
// FILTER + COUNT
// ══════════════════════════════════════════════════════════════════
let currentFilter = 'all';

function applyFilter(f) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.toggle('active', b.dataset.filter===f));
  document.querySelectorAll('.pkg-card').forEach(c => {
    c.style.display = (f==='all' || c.dataset.status===f) ? '' : 'none';
  });
  updateCount();
}

function updateCount() {
  const visible = [...document.querySelectorAll('.pkg-card')].filter(c=>c.style.display!=='none').length;
  document.getElementById('pkg-count').textContent = visible + ' package' + (visible!==1?'s':'');
}

// ══════════════════════════════════════════════════════════════════
// PROVINCE POOL — 75% outside QC, 25% QC
// ══════════════════════════════════════════════════════════════════
const PROVINCE_POOL = [
  // 25% QC
  'QC','QC','QC','QC','QC',
  // 75% outside QC (equal spread across provinces)
  'ON','ON','ON','ON',
  'BC','BC','BC',
  'AB','AB','AB',
  'NS','NS',
  'NB','NB',
  'MB','MB',
  'SK',
  'NL',
  'PE',
];
function randProvince() { return rand(PROVINCE_POOL); }

// ══════════════════════════════════════════════════════════════════
// DELIVERED SCENARIOS pool (for history generation)
// ══════════════════════════════════════════════════════════════════
const DELIVERED_SCENARIOS = [
  // 90% standard "Delivered"
  'clean','clean','clean','clean','clean',
  'clean','clean','clean','clean',
  // 10% variants
  'clean_door','clean_locker','clean_reception','clean_signature',
];

// ══════════════════════════════════════════════════════════════════
// INIT
// deliveryDaysAgo=0 → delivery is TODAY (MASTER_DATE)
// deliveryDaysAgo=N → delivery was N days ago
// ══════════════════════════════════════════════════════════════════
const list = document.getElementById('packages-list');

// ── Scenario weighted pools ──────────────────────────────────────
const OFD_SCENARIOS = [
  'outfordelivery','outfordelivery','outfordelivery',   // 3× standard (most common)
  'outfordelivery_pm','outfordelivery_pm',               // 2× afternoon
  'ofd_second_attempt',                                  // 1× second attempt
];
const TRANSIT_SCENARIOS = [
  'transit','transit','transit','transit',               // 4× mid-route (most common)
  'transit_near','transit_near',                         // 2× near destination
  'transit_early',                                       // 1× just departed
];

// ── Build today's active packages pool: 25 OFD + 55 transit + 12 delivered
// then Fisher-Yates shuffle the whole pool for a realistic mixed list ──
const todayPkgs = [];

for (let i = 0; i < 25; i++)
  todayPkgs.push(buildRoute(randProvince(), OFD_SCENARIOS[i % OFD_SCENARIOS.length], 0));

for (let i = 0; i < 55; i++)
  todayPkgs.push(buildRoute(randProvince(), TRANSIT_SCENARIOS[i % TRANSIT_SCENARIOS.length], 0));

// 12 delivered today sprinkled throughout
for (let i = 0; i < 12; i++)
  todayPkgs.push(buildRoute(randProvince(), rand(DELIVERED_SCENARIOS), 0));

// Fisher-Yates shuffle — truly random order
for (let i = todayPkgs.length - 1; i > 0; i--) {
  const j = Math.floor(Math.random() * (i + 1));
  [todayPkgs[i], todayPkgs[j]] = [todayPkgs[j], todayPkgs[i]];
}

// Add to DOM — all collapsed
todayPkgs.forEach(pkg => list.appendChild(makePkgCard(pkg, false)));

// ── 1 Delayed + 1 Pending — always at the end of today's list ────
list.appendChild(makePkgCard(buildRoute(rand(PROVINCE_POOL), 'delayed_sort', 0), false));
list.appendChild(makePkgCard(buildRoute(rand(PROVINCE_POOL), 'pending', 0), false));

// ── Delivered last 10 days — 35 to 40 per day ────────────────────
for (let day = 1; day <= 10; day++) {
  const count = 35 + Math.floor(Math.random() * 6); // 35–40 per day
  for (let i = 0; i < count; i++) {
    list.appendChild(makePkgCard(buildRoute(randProvince(), rand(DELIVERED_SCENARIOS), day), false));
  }
}

updateCount();

// ══════════════════════════════════════════════════════════════════
// MODAL
// ══════════════════════════════════════════════════════════════════
const overlay = document.getElementById('modal-overlay');

document.getElementById('btn-generate').addEventListener('click', () => {
  overlay.classList.add('visible');
});
document.getElementById('btn-modal-cancel').addEventListener('click', () => {
  overlay.classList.remove('visible');
});
overlay.addEventListener('click', e => { if (e.target===overlay) overlay.classList.remove('visible'); });

// ── Populate scenario dropdown from SCENARIO_DEFS ────────────────
(function(){
  const sel = document.getElementById('sel-scenario');
  const groups = {};
  SCENARIO_DEFS.forEach(def => {
    if (!groups[def.group]) {
      const og = document.createElement('optgroup');
      og.label = '── ' + def.group + ' ──';
      sel.appendChild(og);
      groups[def.group] = og;
    }
    const opt = document.createElement('option');
    opt.value = def.key;
    opt.textContent = def.label;
    groups[def.group].appendChild(opt);
  });
})();

document.getElementById('btn-modal-generate').addEventListener('click', () => {
  let province     = document.getElementById('sel-province').value;
  let scenario     = document.getElementById('sel-scenario').value;
  const labelOverride = document.getElementById('inp-label').value.trim();
  const qty        = parseInt(document.getElementById('inp-qty').value, 10) || 1;

  // Use DocumentFragment for bulk inserts — much faster than individual DOM ops
  const frag = document.createDocumentFragment();
  for (let i = 0; i < qty; i++) {
    const prov = (province === '__RANDOM__') ? randProvince() : province;
    const scen = (scenario === '__RANDOM__') ? rand(SCENARIO_DEFS).key : scenario;
    const pkg  = buildRoute(prov, scen);
    // Only apply label override on single-shipment generations
    if (qty === 1 && labelOverride) pkg.label = labelOverride;
    // Only open first card when bulk-generating
    frag.prepend(makePkgCard(pkg, i === 0));
  }
  list.prepend(frag);
  list.firstElementChild.scrollIntoView({ behavior:'smooth', block:'start' });
  applyFilter(currentFilter);
  updateCount();

  document.getElementById('inp-label').value = '';
  document.getElementById('inp-qty').value = 1;
  document.getElementById('qty-display').textContent = '1';
  overlay.classList.remove('visible');
});

// ══════════════════════════════════════════════════════════════════
// FILTER BUTTONS
// ══════════════════════════════════════════════════════════════════
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => applyFilter(btn.dataset.filter));
});

// EXPAND / COLLAPSE ALL
document.getElementById('btn-expand-all').addEventListener('click', () => {
  document.querySelectorAll('.pkg-card').forEach(c => c.classList.add('open'));
});
document.getElementById('btn-collapse-all').addEventListener('click', () => {
  document.querySelectorAll('.pkg-card').forEach(c => c.classList.remove('open'));
});


// ══════════════════════════════════════════════════════════════════
// DATE CONTROL — apply master date to all packages
// ══════════════════════════════════════════════════════════════════
(function(){
  // Set today as default in the date input
  const inp = document.getElementById('master-date');
  // Use local date to avoid UTC timezone offset showing wrong day
  const today = new Date();
  const localDate = today.getFullYear() + '-' +
    String(today.getMonth()+1).padStart(2,'0') + '-' +
    String(today.getDate()).padStart(2,'0');
  inp.value = localDate;

  document.getElementById('btn-apply-date').addEventListener('click', () => {
    const val = inp.value;
    if(!val) return;

    setMasterDate(val);
    const [y,m,d] = val.split('-').map(Number);
    const refDate = new Date(y, m-1, d, 0, 0, 0); // midnight — must match MASTER_DATE base

    // Re-render all date cells on the page using stored offsets
    CARD_OFFSETS.forEach((offsets, card) => {
      const dateCells = card.querySelectorAll('.td-date [contenteditable]');
      dateCells.forEach((cell, i) => {
        if(offsets[i] !== undefined) {
          const newDate = new Date(refDate.getTime() + offsets[i] * 60000);
          cell.textContent = formatDate(newDate);
        }
      });
    });
  });
})();

// ══════════════════════════════════════════════════════════════════
// PAGINATION — each page shows 80 delivered packages
// Page 1 keeps the full init list (transit + OFD + delivered history)
// Pages 2–10 clear the list and generate 80 fresh delivered packages
// ══════════════════════════════════════════════════════════════════
let currentPage = 1;

function generateDeliveredPage() {
  const frag = document.createDocumentFragment();
  for (let i = 0; i < 80; i++) {
    // Random delivery date from 1 to 30 days ago for realistic spread
    const daysAgo = 1 + Math.floor(Math.random() * 30);
    const pkg  = buildRoute(randProvince(), rand(DELIVERED_SCENARIOS), daysAgo);
    frag.appendChild(makePkgCard(pkg, false));
  }
  return frag;
}

function setPage(n) {
  currentPage = n;
  // Highlight active page button
  for (let i = 1; i <= 10; i++) {
    const btn = document.getElementById('pg-' + i);
    if (btn) btn.classList.toggle('active', i === n);
  }

  if (n > 1) {
    // Clear current packages list and fill with 80 delivered packages
    const pkgList = document.getElementById('packages-list');
    pkgList.innerHTML = '';
    pkgList.appendChild(generateDeliveredPage());
    // Force filter to delivered so only delivered show
    applyFilter('delivered');
  } else {
    // Page 1 — reload the page to restore the full initial list
    location.reload();
  }

  // Scroll to top of packages list
  document.getElementById('packages-list').scrollIntoView({ behavior:'smooth', block:'start' });
}

</script>
